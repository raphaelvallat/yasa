name: Ruff
on:
  push:
    paths-ignore:
      - '*.rst'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '*.rst'
      - 'docs/**'
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: "Linting"
        run: uvx ruff check
      - name: "Formatting"
        run: uvx ruff format --check
